        - heading "Real inventory. Real operations." [level=2] [ref=e107]:
          - text: Real inventory.
          - text: Real operations.
        - paragraph [ref=e108]: Storage unit auctions are a proven, legitimate method of sourcing resale inventory. When tenants abandon their units, facilities auction the contents publicly to recover unpaid fees. We participate in those auctions, recover the inventory, and put it back into the market.
        - paragraph [ref=e109]: "This is an operational business — not a hobby. We approach every unit with the same discipline you'd apply to any purchasing decision: evaluate the opportunity, manage the cost, and execute the sale systematically."
      - generic [ref=e110]:
