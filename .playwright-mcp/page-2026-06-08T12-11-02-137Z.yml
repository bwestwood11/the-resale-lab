        - heading "Real Finds. Real Flips." [level=2] [ref=e187]:
          - text: Real Finds.
          - text: Real Flips.
        - paragraph [ref=e188]: We actively source inventory from abandoned storage unit auctions and Facebook Marketplace. This isn't dropshipping or retail arbitrage — we physically acquire, sort, photograph, and list every single item.
        - paragraph [ref=e189]: Every unit is a mystery box. We've learned to evaluate quickly, bid strategically, and execute the entire resale process fast enough to turn a consistent profit.
