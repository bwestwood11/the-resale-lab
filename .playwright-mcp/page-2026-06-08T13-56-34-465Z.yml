            - generic [ref=e221]:
              - heading "Scout & Bid" [level=3] [ref=e222]
              - paragraph [ref=e223]: We locate storage unit auctions at local facilities. When tenants abandon units, the contents are sold publicly. We evaluate each unit fast — estimating value vs. risk before bidding.
          - generic [ref=e224]:
            - generic [ref=e225]:
              - generic [ref=e226]: "02"
              - img [ref=e228]
            - generic [ref=e232]:
              - heading "Sort & Photograph" [level=3] [ref=e233]
              - paragraph [ref=e234]: Every unit is sorted systematically. Sellable items are photographed, researched, and priced using live market comps. We don't guess — every listing is backed by real data.
          - generic [ref=e235]:
            - generic [ref=e236]:
              - generic [ref=e237]: "03"
              - img [ref=e239]
            - generic [ref=e242]:
              - heading "List & Sell Fast" [level=3] [ref=e243]
              - paragraph [ref=e244]: Inventory goes live across multiple platforms using our own crosslisting software. What takes most resellers hours takes us minutes. We move product quickly and reinvest the capital.
