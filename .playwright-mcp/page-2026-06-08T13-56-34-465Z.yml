        - paragraph [ref=e209]: Pillar 01 · Storage Unit Reselling
        - heading "Real Finds. Real Flips." [level=2] [ref=e210]:
          - text: Real Finds.
          - text: Real Flips.
        - paragraph [ref=e211]: We actively source inventory from abandoned storage unit auctions and Facebook Marketplace. Every item is physically acquired, sorted, photographed, and listed. This is not dropshipping — it's real operations.
        - paragraph [ref=e212]: Every unit is a mystery. We've built a disciplined process for evaluating, bidding, sorting, and listing that makes each acquisition consistently profitable.
